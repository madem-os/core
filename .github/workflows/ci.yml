name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            binutils \
            nasm \
            python3 \
            qemu-system-x86

      - name: Build image
        run: ./build.sh --build-only

      - name: Run unit tests
        run: ./tests/run-unit.sh

      - name: Run e2e tests
        run: python3 tests/e2e.py
